bundle:
  name: pipeline_etl_compras
  
variables:
  cluster_id:
    description: Cluster ID a usar segun el entorno
    
targets:
  dev:
    mode: development
    default: true
    workspace:
      host: https://adb-7405612636931209.9.azuredatabricks.net
    variables:
      cluster_id: 0304-192558-zbwvycv6

  prod:
    mode: production
    workspace:
      host: https://adb-7405612536710406.6.azuredatabricks.net
    variables:
      cluster_id: 0301-020814-5djh8vxe

resources:
  jobs:
    pipeline_etl_compras:
      name: pipeline_etl_compras

      schedule:
        quartz_cron_expression: "0 0 8 * * ?"
        timezone_id: "America/Lima"
        
      queue:
        enabled: true

      run_as:
        service_principal_name: df841712-a37a-4123-a404-ae196e53460f

      performance_target: PERFORMANCE_OPTIMIZED

      tasks:
        - task_key: bronze_layer
          existing_cluster_id: ${var.cluster_id}
          notebook_task:
            notebook_path: ./bronze_carga_diaria.ipynb
            source: WORKSPACE

        - task_key: bronze_calidad
          depends_on:
            - task_key: bronze_layer
          existing_cluster_id: ${var.cluster_id}
          notebook_task:
            notebook_path: ./bronze_calidad.ipynb
            source: WORKSPACE

        - task_key: validacion_calidad_bl
          depends_on:
            - task_key: bronze_calidad
          condition_task:
            op: EQUAL_TO
            left: "{{tasks.bronze_calidad.values.estado}}"
            right: "Validación Exitosa"

        - task_key: silver_layer
          depends_on:
            - task_key: validacion_calidad_bl
              outcome: "true"
          existing_cluster_id: ${var.cluster_id}
          notebook_task:
            notebook_path: ./silver_layer.ipynb
            source: WORKSPACE

        - task_key: calidad_silver_layer
          depends_on:
            - task_key: silver_layer
          existing_cluster_id: ${var.cluster_id}
          notebook_task:
            notebook_path: ./silver_caldiad.ipynb
            source: WORKSPACE

        - task_key: correo_calidad_bronze
          depends_on:
            - task_key: validacion_calidad_bl
              outcome: "false"
          existing_cluster_id: ${var.cluster_id}
          notebook_task:
            notebook_path: ./correos/Notificar Problemas Calidad.ipynb
            source: WORKSPACE

        - task_key: validar_calidad_silver
          depends_on:
            - task_key: calidad_silver_layer
          condition_task:
            op: EQUAL_TO
            left: "{{tasks.calidad_silver_layer.values.estado}}"
            right: "Validación Exitosa"

        - task_key: gold_layer
          depends_on:
            - task_key: validar_calidad_silver
              outcome: "true"
          existing_cluster_id: ${var.cluster_id}
          notebook_task:
            notebook_path: ./gold_layer.ipynb
            source: WORKSPACE

        - task_key: enviar_correo_error
          depends_on:
            - task_key: gold_layer
          run_if: AT_LEAST_ONE_FAILED
          existing_cluster_id: ${var.cluster_id}
          notebook_task:
            notebook_path: ./correos/Notificar Problemas Calidad.ipynb
            source: WORKSPACE

        - task_key: correo_calidad_silver
          depends_on:
            - task_key: validar_calidad_silver
              outcome: "false"
          existing_cluster_id: ${var.cluster_id}
          notebook_task:
            notebook_path: ./correos/Notificar Problemas Calidad.ipynb
            source: WORKSPACE

        - task_key: enviar_correo_success
          depends_on:
            - task_key: gold_layer
          existing_cluster_id: ${var.cluster_id}
          notebook_task:
            notebook_path: ./correos/Notificar Ejecucion Exitosa.ipynb
            source: WORKSPACE
