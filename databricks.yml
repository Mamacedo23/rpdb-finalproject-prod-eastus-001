bundle:
  name: pipeline_etl_compras
  
variables:
  adls_account_name:
    description: Cuenta ADLS según retorno
  adls_container:
    description: Contenedor ADLS según retorno
    
targets:
  dev:
    mode: development
    workspace:
      host: https://adb-7405612636931209.9.azuredatabricks.net
    variables:
      adls_account_name: safinalproject
      adls_container: raw-data-prueba
  
  prod:
    mode: production
    workspace:
      host: https://adb-7405612536710406.6.azuredatabricks.net
    variables:
      adls_account_name: safinalproject
      adls_container: raw-data

resources:
  jobs:
    pipeline_etl_compras:
      name: pipeline_etl_compras

      schedule:
        quartz_cron_expression: "0 0 8 * * ?"
        timezone_id: America/Lima
        
      queue:
        enabled: true

      run_as:
        service_principal_name: df841712-a37a-4123-a404-ae196e53460f

      performance_target: PERFORMANCE_OPTIMIZED

      job_clusters:
        - job_cluster_key: cluster_etl_compras
          new_cluster:
            spark_version: 15.4.x-scala2.12
            node_type_id: Standard_D4s_v3
            num_workers: 1
            data_security_mode: SINGLE_USER
            single_user_name: df841712-a37a-4123-a404-ae196e53460f
    
      tasks:
        - task_key: bronze_layer
          job_cluster_key: cluster_etl_compras
          notebook_task:
            notebook_path: ./bronze_carga_diaria.ipynb
            source: WORKSPACE
            base_parameters:
              adls_account_name: ${var.adls_account_name}
              adls_container: ${var.adls_container}
            
        - task_key: bronze_calidad
          depends_on:
            - task_key: bronze_layer
          job_cluster_key: cluster_etl_compras
          notebook_task:
            notebook_path: ./bronze_calidad.ipynb
            source: WORKSPACE

        - task_key: validacion_calidad_bl
          depends_on:
            - task_key: bronze_calidad
          condition_task:
            op: EQUAL_TO
            left: "{{tasks.bronze_calidad.values.estado}}"
            right: "Validación Exitosa"

        - task_key: silver_layer
          depends_on:
            - task_key: validacion_calidad_bl
              outcome: "true"
          job_cluster_key: cluster_etl_compras
          notebook_task:
            notebook_path: ./silver_layer.ipynb
            source: WORKSPACE

        - task_key: calidad_silver_layer
          depends_on:
            - task_key: silver_layer
          job_cluster_key: cluster_etl_compras
          notebook_task:
            notebook_path: ./silver_caldiad.ipynb
            source: WORKSPACE

        - task_key: correo_calidad_bronze
          depends_on:
            - task_key: validacion_calidad_bl
              outcome: "false"
          job_cluster_key: cluster_etl_compras
          notebook_task:
            notebook_path: ./correos/Notificar Problemas Calidad.ipynb
            source: WORKSPACE

        - task_key: validar_calidad_silver
          depends_on:
            - task_key: calidad_silver_layer
          condition_task:
            op: EQUAL_TO
            left: "{{tasks.calidad_silver_layer.values.estado}}"
            right: "Validación Exitosa"

        - task_key: gold_layer
          depends_on:
            - task_key: validar_calidad_silver
              outcome: "true"
          job_cluster_key: cluster_etl_compras
          notebook_task:
            notebook_path: ./gold_layer.ipynb
            source: WORKSPACE

        - task_key: enviar_correo_error
          depends_on:
            - task_key: gold_layer
          run_if: AT_LEAST_ONE_FAILED
          job_cluster_key: cluster_etl_compras
          notebook_task:
            notebook_path: ./correos/Notificar Problemas Calidad.ipynb
            source: WORKSPACE
            
        - task_key: correo_calidad_silver
          depends_on:
            - task_key: validar_calidad_silver
              outcome: "false"
          job_cluster_key: cluster_etl_compras
          notebook_task:
            notebook_path: ./correos/Notificar Problemas Calidad.ipynb
            source: WORKSPACE

        - task_key: enviar_correo_success
          depends_on:
            - task_key: gold_layer
          job_cluster_key: cluster_etl_compras
          notebook_task:
            notebook_path: ./correos/Notificar Ejecucion Exitosa.ipynb
            source: WORKSPACE
