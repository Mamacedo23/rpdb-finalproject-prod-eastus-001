name: main

on:
  push:
    paths-ignore:
      - .github/**
    branches:
      - main

jobs:
  deploy-dev:
    runs-on: ubuntu-latest
    environment: development
    env:
      DATABRICKS_HOST: ${{ secrets.DEV_DEPLOYMENT_TARGET_URL }}
      DATABRICKS_TOKEN: ${{ secrets.DEV_DEPLOYMENT_TARGET_TOKEN }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Install Databricks CLI
        uses: databricks/setup-cli@main

      - name: Pull Git Folder (Dev)
        run: |
          REPO_ID=$(curl -s -X GET \
            "$DATABRICKS_HOST/api/2.0/repos" \
            -H "Authorization: Bearer $DATABRICKS_TOKEN" | \
            jq -r '.repos[] | select(.path=="/Workspace/Users/railgun@accelidol2gmail.onmicrosoft.com/rpdb-finalproject-dev-eastus-001") | .id')
          curl -s -X PATCH \
            "$DATABRICKS_HOST/api/2.0/repos/$REPO_ID" \
            -H "Authorization: Bearer $DATABRICKS_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"branch": "main"}'

      - name: Deploy Bundle (Dev)
        run: databricks bundle deploy --target dev

  deploy-prod:
    needs: deploy-dev
    runs-on: ubuntu-latest
    environment: production
    env:
      DATABRICKS_HOST: ${{ secrets.PROD_DEPLOYMENT_TARGET_URL }}
      DATABRICKS_TOKEN: ${{ secrets.PROD_DEPLOYMENT_TARGET_TOKEN }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Install Databricks CLI
        uses: databricks/setup-cli@main

      - name: Pull Git Folder (Prod)
        run: |
          REPO_ID=$(curl -s -X GET \
            "$DATABRICKS_HOST/api/2.0/repos" \
            -H "Authorization: Bearer $DATABRICKS_TOKEN" | \
            jq -r '.repos[] | select(.path=="/Workspace/Users/railgun@accelidol2gmail.onmicrosoft.com/folderrpdb-finalproject-prod-eastus-001") | .id')
          curl -s -X PATCH \
            "$DATABRICKS_HOST/api/2.0/repos/$REPO_ID" \
            -H "Authorization: Bearer $DATABRICKS_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"branch": "main"}'

      - name: Deploy Bundle (Prod)
        run: databricks bundle deploy --target prod
