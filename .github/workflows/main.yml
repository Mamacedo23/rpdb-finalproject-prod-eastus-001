name: main
on:
  push:
    paths-ignore:
      - .github/**
    branches:
      - main
jobs:
  deploy-dev:
    runs-on: ubuntu-latest
    environment: development
    env:
      DATABRICKS_HOST: ${{ secrets.DEV_DEPLOYMENT_TARGET_URL }}
      DATABRICKS_TOKEN: ${{ secrets.DEV_DEPLOYMENT_TARGET_TOKEN }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v3
        with:
          python-version: 3.8
      - name: Set up Databricks CLI
        uses: databricks/setup-cli@main
      - name: Sync notebooks to Workspace (Dev)
        run: |
          databricks workspace import-dir \
            . \
            /Workspace/Users/railgun@accelidol2gmail.onmicrosoft.com/rpdb-finalproject-dev-eastus-001 \
            --overwrite
      - name: Deploy Bundle (Dev)
        run: databricks bundle deploy --target dev

  deploy-prod:
    needs: deploy-dev
    runs-on: ubuntu-latest
    environment: production
    env:
      DATABRICKS_HOST: ${{ secrets.PROD_DEPLOYMENT_TARGET_URL }}
      DATABRICKS_TOKEN: ${{ secrets.PROD_DEPLOYMENT_TARGET_TOKEN }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v3
        with:
          python-version: 3.8
      - name: Set up Databricks CLI
        uses: databricks/setup-cli@main
      - name: Sync notebooks to Workspace (Prod)
        run: |
          databricks workspace import-dir \
            . \
            /Workspace/Users/railgun@accelidol2gmail.onmicrosoft.com/rpdb-finalproject-prod-eastus-001 \
            --overwrite
      - name: Deploy Bundle (Prod)
        run: databricks bundle deploy --target prod
